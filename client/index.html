<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journey Map</title>
    <script>
      // Apply theme before paint to avoid a flash of the wrong mode
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) { document.documentElement.classList.add('dark'); document.documentElement.style.colorScheme = 'dark'; }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
